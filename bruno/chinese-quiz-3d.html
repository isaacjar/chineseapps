<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chinese Quest 3D (Bruno Style)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    color: #e8d060;
    user-select: none;
  }

  canvas { display: block; }

  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 14px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(to bottom, rgba(0,0,0,0.85), transparent);
    pointer-events: none;
    z-index: 10;
  }

  #hud .logo {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 1.3rem;
    color: #e8d060;
    text-shadow: 0 0 20px #e8d060aa;
    letter-spacing: 3px;
  }

  #hud .level-info {
    font-size: 0.85rem;
    color: #a0f0a0;
    text-shadow: 0 0 10px #a0f0a0;
    letter-spacing: 2px;
  }

  #hud .health-bar {
    display: flex;
    gap: 6px;
    align-items: center;
    font-size: 0.8rem;
  }

  .life { color: #ff4444; font-size: 1rem; }
  .life.empty { color: #333; }

  #overlay {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 20;
    transition: opacity 0.5s;
  }

  #overlay.hidden { opacity: 0; pointer-events: none; }

  /* Start screen */
  #start-screen {
    text-align: center;
    animation: flicker 0.1s infinite;
  }

  @keyframes flicker {
    0%,95%,100% { opacity: 1; }
    97% { opacity: 0.92; }
  }

  #start-screen h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 4rem;
    font-weight: 900;
    color: #e8d060;
    text-shadow: 0 0 40px #e8d060, 0 0 80px #e8d06066;
    letter-spacing: 6px;
    margin-bottom: 8px;
  }

  #start-screen .subtitle {
    color: #a0f0a0;
    font-size: 1.1rem;
    letter-spacing: 4px;
    margin-bottom: 60px;
    text-shadow: 0 0 15px #a0f0a0;
  }

  .btn-start {
    background: transparent;
    border: 2px solid #e8d060;
    color: #e8d060;
    font-family: 'Orbitron', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
    letter-spacing: 4px;
    padding: 16px 48px;
    cursor: pointer;
    text-transform: uppercase;
    box-shadow: 0 0 20px #e8d06055, inset 0 0 20px #e8d06011;
    transition: all 0.2s;
    animation: pulse-border 2s ease-in-out infinite;
  }

  @keyframes pulse-border {
    0%,100% { box-shadow: 0 0 20px #e8d06055, inset 0 0 20px #e8d06011; }
    50% { box-shadow: 0 0 40px #e8d060aa, inset 0 0 30px #e8d06033; }
  }

  .btn-start:hover {
    background: #e8d06022;
    transform: scale(1.04);
  }

  /* Question panel */
  #question-panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 24px 40px 32px;
    background: linear-gradient(to top, rgba(0,0,0,0.97) 60%, transparent);
    z-index: 20;
    transition: transform 0.4s cubic-bezier(.77,0,.18,1), opacity 0.4s;
  }

  #question-panel.hidden {
    transform: translateY(100%);
    opacity: 0;
    pointer-events: none;
  }

  .room-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.7rem;
    color: #ff6644;
    letter-spacing: 4px;
    margin-bottom: 10px;
    text-shadow: 0 0 12px #ff6644;
  }

  .question-text {
    font-size: 1.5rem;
    color: #ffffff;
    letter-spacing: 2px;
    margin-bottom: 6px;
    line-height: 1.5;
  }

  .question-text .blank {
    display: inline-block;
    border-bottom: 3px solid #e8d060;
    min-width: 80px;
    text-align: center;
    color: #e8d060;
    text-shadow: 0 0 15px #e8d060;
    margin: 0 4px;
  }

  .question-translation {
    font-size: 0.85rem;
    color: #888;
    margin-bottom: 22px;
    letter-spacing: 1px;
  }

  .options {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  .option-btn {
    flex: 1;
    min-width: 140px;
    background: rgba(232,208,96,0.08);
    border: 1px solid #e8d06066;
    color: #e8d060;
    font-family: 'Share Tech Mono', monospace;
    font-size: 1rem;
    letter-spacing: 2px;
    padding: 14px 20px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .option-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.03));
  }

  .option-btn:hover:not(:disabled) {
    background: rgba(232,208,96,0.22);
    border-color: #e8d060;
    transform: translateY(-2px);
    box-shadow: 0 4px 20px #e8d06044;
  }

  .option-btn.correct {
    background: rgba(100,255,120,0.25) !important;
    border-color: #64ff78 !important;
    color: #64ff78 !important;
    box-shadow: 0 0 30px #64ff7866 !important;
    animation: correct-flash 0.4s ease;
  }

  .option-btn.wrong {
    background: rgba(255,60,60,0.25) !important;
    border-color: #ff3c3c !important;
    color: #ff3c3c !important;
    box-shadow: 0 0 30px #ff3c3c66 !important;
    animation: shake 0.4s ease;
  }

  @keyframes correct-flash {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  /* Transition flash */
  #flash {
    position: fixed;
    inset: 0;
    background: #e8d060;
    opacity: 0;
    pointer-events: none;
    z-index: 50;
    transition: opacity 0.15s;
  }

  /* End screen */
  #end-screen {
    text-align: center;
    display: none;
  }

  #end-screen h2 {
    font-family: 'Orbitron', sans-serif;
    font-size: 3rem;
    font-weight: 900;
    color: #e8d060;
    text-shadow: 0 0 40px #e8d060;
    letter-spacing: 4px;
    margin-bottom: 16px;
  }

  #end-screen p {
    color: #a0f0a0;
    font-size: 1rem;
    letter-spacing: 3px;
    margin-bottom: 40px;
  }

  /* Scanlines overlay */
  #scanlines {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.07) 2px,
      rgba(0,0,0,0.07) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* Minimap */
  #minimap {
    position: fixed;
    top: 60px;
    right: 20px;
    display: flex;
    gap: 4px;
    z-index: 10;
  }

  .mm-room {
    width: 14px;
    height: 14px;
    border: 1px solid #555;
    background: #111;
    transition: all 0.3s;
  }

  .mm-room.visited { background: #444; border-color: #888; }
  .mm-room.current { background: #e8d060; border-color: #e8d060; box-shadow: 0 0 8px #e8d060; }

  #progress-bar-wrap {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: #111;
    z-index: 200;
  }

  #progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #e8d060, #ff6644);
    transition: width 0.5s ease;
    box-shadow: 0 0 8px #e8d060;
  }
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="scanlines"></div>
<div id="flash"></div>

<div id="hud">
  <div class="logo">CHINESE QUEST</div>
  <div class="level-info" id="level-info">SALA 1 / 6</div>
  <div class="health-bar">
    <span id="life1" class="life">♥</span>
    <span id="life2" class="life">♥</span>
    <span id="life3" class="life">♥</span>
  </div>
</div>

<div id="minimap">
  <div class="mm-room current" id="mm0"></div>
  <div class="mm-room" id="mm1"></div>
  <div class="mm-room" id="mm2"></div>
  <div class="mm-room" id="mm3"></div>
  <div class="mm-room" id="mm4"></div>
  <div class="mm-room" id="mm5"></div>
</div>

<!-- Start overlay -->
<div id="overlay">
  <div id="start-screen">
    <h1>汉语</h1>
    <div class="subtitle">CHINESE QUEST · PINYIN DUNGEON</div>
    <button class="btn-start" onclick="startGame()">[ NUEVA PARTIDA ]</button>
  </div>
  <div id="end-screen">
    <h2>🏆 VICTORIA</h2>
    <p>HAS COMPLETADO LOS 6 NIVELES · BRUNO · 恭喜你！</p>
    <button class="btn-start" onclick="restartGame()">[ JUGAR DE NUEVO ]</button>
  </div>
</div>

<!-- Question panel -->
<div id="question-panel" class="hidden">
  <div class="room-label" id="room-label">NIVEL 1 · SALA DEL DRAGÓN</div>
  <div class="question-text" id="question-text"></div>
  <div class="question-translation" id="question-translation"></div>
  <div class="options" id="options"></div>
</div>

<div id="progress-bar-wrap">
  <div id="progress-bar" style="width:0%"></div>
</div>

<script>
// ─── QUESTIONS DATA ───────────────────────────────────────────────
const levels = [
  {
    room: "SALA DEL DRAGÓN",
    question: "Wǒ ___ xuésheng.",
    translation: "Yo ___ estudiante.",
    parts: ["Wǒ ", " xuésheng."],
    options: ["shì", "yǒu", "hǎo"],
    answer: "shì",
    meaning: "shì = soy/es/son"
  },
  {
    room: "SALA DE LA LUNA",
    question: "Nǐ ___ nǎ guó rén?",
    translation: "¿De qué país eres ___?",
    parts: ["Nǐ ", " nǎ guó rén?"],
    options: ["shì", "qù", "lái"],
    answer: "shì",
    meaning: "shì = eres"
  },
  {
    room: "SALA DEL FUEGO",
    question: "Wǒ ___ sān gè péngyou.",
    translation: "Tengo ___ tres amigos.",
    parts: ["Wǒ ", " sān gè péngyou."],
    options: ["shì", "yǒu", "jiào"],
    answer: "yǒu",
    meaning: "yǒu = tener/hay"
  },
  {
    room: "SALA DEL TIGRE",
    question: "Tā ___ Měiguó rén.",
    translation: "Él/ella ___ estadounidense.",
    parts: ["Tā ", " Měiguó rén."],
    options: ["bú shì", "yǒu", "hěn hǎo"],
    answer: "bú shì",
    meaning: "bú shì = no es"
  },
  {
    room: "SALA DEL AGUA",
    question: "Nǐ hǎo ___ ma?",
    translation: "¿Estás ___?",
    parts: ["Nǐ hǎo ", " ma?"],
    options: ["hē", "chī", "kàn"],
    answer: "hē",
    meaning: "hē = beber (nǐ hǎo hē ma = ¿te sabe bien beber?)"
  },
  {
    room: "SALA FINAL · FÉNIX",
    question: "Wǒ ___ chī fàn.",
    translation: "Yo ___ comer arroz / Yo quiero comer.",
    parts: ["Wǒ ", " chī fàn."],
    options: ["xiǎng", "hǎo", "nǎ"],
    answer: "xiǎng",
    meaning: "xiǎng = querer/desear"
  }
];

// ─── GAME STATE ───────────────────────────────────────────────────
let currentLevel = 0;
let lives = 3;
let gameRunning = false;
let moving = false;

// ─── THREE-STYLE 3D RENDERER (pure canvas) ────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Room colors by level
const roomPalettes = [
  { wall: '#3a2010', floor: '#1a0e08', ceil: '#1a0e08', accent: '#ff6622', fog: '#200a00' },
  { wall: '#0a1a3a', floor: '#050e1a', ceil: '#050e1a', accent: '#2266ff', fog: '#000a20' },
  { wall: '#2a0a0a', floor: '#120505', ceil: '#120505', accent: '#ff2222', fog: '#1a0000' },
  { wall: '#0a2a0a', floor: '#051205', ceil: '#051205', accent: '#22ff44', fog: '#001a00' },
  { wall: '#0a1a2a', floor: '#050a12', ceil: '#050a12', accent: '#22ccff', fog: '#00080f' },
  { wall: '#1a0a2a', floor: '#0a0512', ceil: '#0a0512', accent: '#cc44ff', fog: '#0a0018' },
];

// Camera
let cam = { x: 0, y: 0, z: -6, yaw: 0, pitch: 0 };
let targetZ = -6;
let animating = false;

function lerp(a, b, t) { return a + (b - a) * t; }

// Simple raycaster-style corridor render
function renderScene(t) {
  const pal = roomPalettes[Math.min(currentLevel, 5)];

  // Background fog
  ctx.fillStyle = pal.fog;
  ctx.fillRect(0, 0, W, H);

  const horizon = H * 0.45;
  const fov = 1.1;
  const numStrips = Math.ceil(W / 2);
  const nearWall = 0.5;
  const farWall = 12;

  // Draw floor & ceiling gradient
  const ceilGrad = ctx.createLinearGradient(0, 0, 0, horizon);
  ceilGrad.addColorStop(0, pal.fog);
  ceilGrad.addColorStop(1, pal.ceil);
  ctx.fillStyle = ceilGrad;
  ctx.fillRect(0, 0, W, horizon);

  const floorGrad = ctx.createLinearGradient(0, horizon, 0, H);
  floorGrad.addColorStop(0, pal.floor);
  floorGrad.addColorStop(1, pal.fog);
  ctx.fillStyle = floorGrad;
  ctx.fillRect(0, horizon, W, H - horizon);

  // Draw corridor walls using strips
  for (let i = 0; i < numStrips; i++) {
    const screenX = (i / numStrips) * W;
    const rayAngle = (i / numStrips - 0.5) * fov + cam.yaw;

    // Simple slab rendering - walls at fixed X distances
    const leftWallDist = 3; // corridor half-width
    const wallSlabs = [2, 4, 6, 8, 11]; // depth slabs

    for (let s = wallSlabs.length - 1; s >= 0; s--) {
      const dist = wallSlabs[s] + cam.z;
      if (dist < 0.1) continue;

      const wallH = (H / dist) * 1.5;
      const wallTop = horizon - wallH / 2;
      const wallBot = horizon + wallH / 2;

      // Lateral offset based on ray angle
      const sideOffset = Math.tan(rayAngle) * dist;
      const corridorW = leftWallDist;

      if (Math.abs(sideOffset) > corridorW) {
        // Side wall
        const brightness = Math.min(1, 1 / dist * 2.5);
        const r = parseInt(pal.wall.slice(1, 3), 16);
        const g = parseInt(pal.wall.slice(3, 5), 16);
        const b = parseInt(pal.wall.slice(5, 7), 16);
        ctx.fillStyle = `rgba(${Math.floor(r*brightness)},${Math.floor(g*brightness)},${Math.floor(b*brightness)},1)`;
        ctx.fillRect(screenX, wallTop, W / numStrips + 1, wallH);
      } else if (s === 0) {
        // End wall
        const brightness = Math.min(1, 1 / dist * 3);
        const r = parseInt(pal.wall.slice(1, 3), 16);
        const g = parseInt(pal.wall.slice(3, 5), 16);
        const b = parseInt(pal.wall.slice(5, 7), 16);
        ctx.fillStyle = `rgba(${Math.floor(r*brightness*1.2)},${Math.floor(g*brightness*1.2)},${Math.floor(b*brightness*1.2)},1)`;
        ctx.fillRect(screenX, wallTop, W / numStrips + 1, wallH);

        // Door/portal glow on center strips
        if (Math.abs(i - numStrips / 2) < numStrips * 0.18) {
          const doorH = wallH * 0.7;
          const doorTop = horizon - doorH / 2;
          const accentR = parseInt(pal.accent.slice(1, 3), 16);
          const accentG = parseInt(pal.accent.slice(3, 5), 16);
          const accentB = parseInt(pal.accent.slice(5, 7), 16);
          ctx.fillStyle = `rgba(${accentR},${accentG},${accentB},${brightness * 0.25})`;
          ctx.fillRect(screenX, doorTop, W / numStrips + 1, doorH);
        }
      }
    }
  }

  // Central ambient glow
  const glow = ctx.createRadialGradient(W/2, horizon, 0, W/2, horizon, W * 0.35);
  const accentR = parseInt(pal.accent.slice(1,3),16);
  const accentG = parseInt(pal.accent.slice(3,5),16);
  const accentB = parseInt(pal.accent.slice(5,7),16);
  glow.addColorStop(0, `rgba(${accentR},${accentG},${accentB},0.12)`);
  glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, W, H);

  // Crosshair
  const cx = W / 2, cy = H * 0.45;
  ctx.strokeStyle = `rgba(${accentR},${accentG},${accentB},0.7)`;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(cx - 10, cy); ctx.lineTo(cx + 10, cy);
  ctx.moveTo(cx, cy - 10); ctx.lineTo(cx, cy + 10);
  ctx.stroke();

  // Subtle vignette
  const vig = ctx.createRadialGradient(W/2, H/2, H*0.3, W/2, H/2, H*0.85);
  vig.addColorStop(0, 'transparent');
  vig.addColorStop(1, 'rgba(0,0,0,0.65)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);
}

// Animation
let lastTime = 0;
function loop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  // Subtle camera bob
  if (gameRunning && !moving) {
    cam.yaw = Math.sin(ts * 0.0007) * 0.015;
    cam.pitch = Math.cos(ts * 0.0009) * 0.008;
  }

  renderScene(ts);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ─── UI HELPERS ───────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('level-info').textContent = `SALA ${currentLevel + 1} / 6`;
  for (let i = 1; i <= 3; i++) {
    const el = document.getElementById(`life${i}`);
    el.className = 'life' + (i > lives ? ' empty' : '');
    if (i > lives) el.style.opacity = '0.2';
    else el.style.opacity = '1';
  }
  document.getElementById('progress-bar').style.width = `${(currentLevel / 6) * 100}%`;

  for (let i = 0; i < 6; i++) {
    const mm = document.getElementById(`mm${i}`);
    mm.className = 'mm-room';
    if (i < currentLevel) mm.classList.add('visited');
    if (i === currentLevel) mm.classList.add('current');
  }
}

function flash(color = '#e8d060') {
  const el = document.getElementById('flash');
  el.style.background = color;
  el.style.opacity = '0.7';
  setTimeout(() => { el.style.opacity = '0'; }, 150);
}

function showQuestion() {
  const lvl = levels[currentLevel];
  document.getElementById('room-label').textContent = `NIVEL ${currentLevel + 1} · ${lvl.room}`;

  // Build question HTML with blank
  document.getElementById('question-text').innerHTML =
    `${lvl.parts[0]}<span class="blank">___</span>${lvl.parts[1]}`;
  document.getElementById('question-translation').textContent = lvl.translation + ' · ' + lvl.meaning;

  const optDiv = document.getElementById('options');
  optDiv.innerHTML = '';
  const shuffled = [...lvl.options].sort(() => Math.random() - 0.5);
  shuffled.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt;
    btn.onclick = () => handleAnswer(btn, opt);
    optDiv.appendChild(btn);
  });

  document.getElementById('question-panel').classList.remove('hidden');
}

function handleAnswer(btn, chosen) {
  const lvl = levels[currentLevel];
  const allBtns = document.querySelectorAll('.option-btn');
  allBtns.forEach(b => b.disabled = true);

  if (chosen === lvl.answer) {
    btn.classList.add('correct');
    // Show the answer in the blank
    document.getElementById('question-text').innerHTML =
      `${lvl.parts[0]}<span class="blank" style="color:#64ff78;border-color:#64ff78">${chosen}</span>${lvl.parts[1]}`;
    flash('#44ff88');

    setTimeout(() => {
      document.getElementById('question-panel').classList.add('hidden');
      if (currentLevel < 5) {
        advanceLevel();
      } else {
        showVictory();
      }
    }, 900);
  } else {
    btn.classList.add('wrong');
    lives--;
    updateHUD();
    flash('#ff3333');

    if (lives <= 0) {
      setTimeout(() => gameOver(), 700);
    } else {
      // Re-enable after delay
      setTimeout(() => {
        btn.disabled = false;
        btn.classList.remove('wrong');
        allBtns.forEach(b => b.disabled = false);
      }, 600);
    }
  }
}

function advanceLevel() {
  moving = true;
  currentLevel++;
  updateHUD();

  // "Warp" animation - zoom into corridor
  let progress = 0;
  const startZ = cam.z;
  const endZ = startZ - 4;
  const startTime = performance.now();
  const dur = 800;

  function warpAnim(now) {
    progress = (now - startTime) / dur;
    if (progress < 1) {
      cam.z = lerp(startZ, endZ, easeIn(progress));
      requestAnimationFrame(warpAnim);
    } else {
      cam.z = -6; // reset
      moving = false;
      setTimeout(showQuestion, 300);
    }
  }
  requestAnimationFrame(warpAnim);
}

function easeIn(t) { return t * t; }

function showVictory() {
  currentLevel = 6;
  updateHUD();
  document.getElementById('progress-bar').style.width = '100%';
  const overlay = document.getElementById('overlay');
  overlay.classList.remove('hidden');
  overlay.style.opacity = '1';
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('end-screen').style.display = 'block';
  flash('#e8d060');
}

function gameOver() {
  // Reset lives and restart same level
  lives = 3;
  updateHUD();
  flash('#ff0000');
  document.getElementById('question-panel').classList.add('hidden');
  setTimeout(() => {
    showQuestion();
  }, 500);
}

function startGame() {
  currentLevel = 0;
  lives = 3;
  gameRunning = true;
  document.getElementById('overlay').classList.add('hidden');
  updateHUD();
  setTimeout(showQuestion, 600);
}

function restartGame() {
  currentLevel = 0;
  lives = 3;
  gameRunning = true;
  document.getElementById('end-screen').style.display = 'none';
  document.getElementById('start-screen').style.display = 'block';
  document.getElementById('overlay').classList.remove('hidden');
  document.getElementById('overlay').style.opacity = '1';
  updateHUD();
}

// ─── INIT ─────────────────────────────────────────────────────────
updateHUD();
</script>
</body>
</html>
