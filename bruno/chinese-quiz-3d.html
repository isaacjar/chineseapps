<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chinese Quest 3D</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; font-family:'Share Tech Mono',monospace; overflow:hidden; color:#e8d060; user-select:none; }
  canvas { display:block; }

  #hud { position:fixed; top:0; left:0; right:0; padding:12px 24px; display:flex; justify-content:space-between; align-items:center; background:linear-gradient(to bottom,rgba(0,0,0,.88),transparent); pointer-events:none; z-index:10; }
  .logo { font-family:'Orbitron',sans-serif; font-weight:900; font-size:1.2rem; color:#e8d060; text-shadow:0 0 20px #e8d060aa; letter-spacing:3px; }
  #level-info { font-size:.8rem; color:#a0f0a0; text-shadow:0 0 10px #a0f0a0; letter-spacing:2px; }
  .lives { display:flex; gap:5px; font-size:1rem; }
  .life { color:#ff4444; } .life.dead { opacity:.18; }

  #minimap { position:fixed; top:58px; right:16px; display:flex; gap:3px; z-index:10; }
  .mm { width:13px; height:13px; border:1px solid #333; background:#0a0a0a; transition:all .3s; }
  .mm.visited { background:#383838; border-color:#666; }
  .mm.current { background:#e8d060; border-color:#e8d060; box-shadow:0 0 8px #e8d060; }

  #overlay { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:30; transition:opacity .5s; }
  #overlay.gone { opacity:0; pointer-events:none; }
  #start-screen { text-align:center; }
  #start-screen h1 { font-family:'Orbitron',sans-serif; font-size:4.5rem; font-weight:900; color:#e8d060; text-shadow:0 0 50px #e8d060,0 0 100px #e8d06055; letter-spacing:6px; margin-bottom:6px; animation:gp 2.5s ease-in-out infinite; }
  @keyframes gp { 0%,100%{text-shadow:0 0 50px #e8d060,0 0 100px #e8d06055;} 50%{text-shadow:0 0 80px #e8d060,0 0 160px #e8d06088;} }
  .subtitle { color:#a0f0a0; font-size:1rem; letter-spacing:4px; margin-bottom:56px; text-shadow:0 0 15px #a0f0a0; }
  .btn { background:transparent; border:2px solid #e8d060; color:#e8d060; font-family:'Orbitron',sans-serif; font-size:1.1rem; font-weight:700; letter-spacing:4px; padding:14px 44px; cursor:pointer; transition:all .2s; }
  .btn:hover { background:#e8d06022; transform:scale(1.04); box-shadow:0 0 30px #e8d06066; }
  #end-screen { text-align:center; display:none; }
  #end-screen h2 { font-family:'Orbitron',sans-serif; font-size:2.8rem; font-weight:900; color:#e8d060; text-shadow:0 0 40px #e8d060; letter-spacing:4px; margin-bottom:14px; }
  #end-screen p { color:#a0f0a0; font-size:.95rem; letter-spacing:3px; margin-bottom:38px; }

  #qpanel { position:fixed; bottom:0; left:0; right:0; padding:20px 40px 28px; background:linear-gradient(to top,rgba(0,0,0,.97) 65%,transparent); z-index:20; transition:transform .45s cubic-bezier(.77,0,.18,1),opacity .45s; }
  #qpanel.off { transform:translateY(100%); opacity:0; pointer-events:none; }
  .rlabel { font-family:'Orbitron',sans-serif; font-size:.65rem; color:#ff6644; letter-spacing:4px; margin-bottom:8px; text-shadow:0 0 12px #ff6644; }
  .qtext { font-size:1.45rem; color:#fff; letter-spacing:2px; margin-bottom:5px; line-height:1.6; }
  .blank { display:inline-block; border-bottom:3px solid #e8d060; min-width:80px; text-align:center; color:#e8d060; text-shadow:0 0 12px #e8d060; margin:0 4px; }
  .qtrans { font-size:.82rem; color:#777; margin-bottom:18px; letter-spacing:1px; }
  .opts { display:flex; gap:14px; flex-wrap:wrap; }
  .obtn { flex:1; min-width:130px; background:rgba(232,208,96,.07); border:1px solid #e8d06055; color:#e8d060; font-family:'Share Tech Mono',monospace; font-size:.95rem; letter-spacing:2px; padding:13px 18px; cursor:pointer; transition:all .15s; text-align:center; }
  .obtn:hover:not(:disabled) { background:rgba(232,208,96,.2); border-color:#e8d060; transform:translateY(-2px); box-shadow:0 4px 18px #e8d06044; }
  .obtn.ok  { background:rgba(100,255,120,.22)!important; border-color:#64ff78!important; color:#64ff78!important; box-shadow:0 0 28px #64ff7855!important; animation:popOk .35s ease; }
  .obtn.bad { background:rgba(255,60,60,.22)!important; border-color:#ff3c3c!important; color:#ff3c3c!important; animation:jolt .35s ease; }
  @keyframes popOk { 0%{transform:scale(1)} 50%{transform:scale(1.06)} 100%{transform:scale(1)} }
  @keyframes jolt { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-7px)} 75%{transform:translateX(7px)} }

  #room-announce { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); font-family:'Orbitron',sans-serif; font-size:1.8rem; font-weight:900; letter-spacing:6px; color:#e8d060; text-shadow:0 0 40px #e8d060; pointer-events:none; z-index:25; opacity:0; transition:opacity .3s; text-align:center; white-space:nowrap; }

  #flash { position:fixed; inset:0; opacity:0; pointer-events:none; z-index:50; transition:opacity .12s; }
  #pbar-wrap { position:fixed; bottom:0; left:0; right:0; height:3px; background:#111; z-index:200; }
  #pbar { height:100%; background:linear-gradient(90deg,#e8d060,#ff6644); transition:width .5s ease; box-shadow:0 0 8px #e8d060; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="flash"></div>
<div id="room-announce"></div>

<div id="hud">
  <div class="logo">汉语 QUEST</div>
  <div id="level-info">SALA 1 / 6</div>
  <div class="lives"><span class="life" id="l1">♥</span><span class="life" id="l2">♥</span><span class="life" id="l3">♥</span></div>
</div>

<div id="minimap">
  <div class="mm current" id="mm0"></div><div class="mm" id="mm1"></div>
  <div class="mm" id="mm2"></div><div class="mm" id="mm3"></div>
  <div class="mm" id="mm4"></div><div class="mm" id="mm5"></div>
</div>

<div id="overlay">
  <div id="start-screen">
    <h1>汉语</h1>
    <div class="subtitle">CHINESE QUEST · PINYIN DUNGEON</div>
    <button class="btn" onclick="startGame()">[ NUEVA PARTIDA ]</button>
  </div>
  <div id="end-screen">
    <h2>🏆 VICTORIA</h2>
    <p>HAS COMPLETADO LOS 6 NIVELES · BRUNO · 恭喜你！</p>
    <button class="btn" onclick="restartGame()">[ JUGAR DE NUEVO ]</button>
  </div>
</div>

<div id="qpanel" class="off">
  <div class="rlabel" id="rlabel">NIVEL 1</div>
  <div class="qtext"  id="qtext"></div>
  <div class="qtrans" id="qtrans"></div>
  <div class="opts"   id="opts"></div>
</div>
<div id="pbar-wrap"><div id="pbar" style="width:0%"></div></div>

<script>
// ══════════════════════════════════════════
//  QUESTIONS
// ══════════════════════════════════════════
const LEVELS = [
  { room:"SALA DEL DRAGÓN",  parts:["Wǒ "," xuésheng."],          opts:["shì","yǒu","hǎo"],      ans:"shì",    note:"shì = soy" },
  { room:"SALA DE LA LUNA",  parts:["Nǐ "," nǎ guó rén?"],        opts:["shì","qù","lái"],        ans:"shì",    note:"shì = eres" },
  { room:"SALA DEL FUEGO",   parts:["Wǒ "," sān gè péngyou."],    opts:["shì","yǒu","jiào"],      ans:"yǒu",    note:"yǒu = tener" },
  { room:"SALA DEL TIGRE",   parts:["Tā "," Měiguó rén."],        opts:["bú shì","yǒu","hěn"],    ans:"bú shì", note:"bú shì = no es" },
  { room:"SALA DEL AGUA",    parts:["Nǐ xiǎng "," shénme?"],      opts:["chī","shì","hǎo"],       ans:"chī",    note:"chī = comer" },
  { room:"CÁMARA DEL FÉNIX", parts:["Wǒ "," chī fàn."],           opts:["xiǎng","hǎo","nǎ"],      ans:"xiǎng",  note:"xiǎng = querer" },
];

// ══════════════════════════════════════════
//  MAP BUILDER
//  Layout: 6 rooms (5×5 cells) connected by corridors (3 wide)
//  Each room block = 8 columns. Total width = 6*8+1 = 49
//  Total height = 7 rows
// ══════════════════════════════════════════
const MAP_W = 49, MAP_H = 7;
const MAP = [];
for (let r = 0; r < MAP_H; r++) MAP.push(new Uint8Array(MAP_W).fill(1));

const ROOM_START_COLS = [];
for (let i = 0; i < 6; i++) {
  const cx = i * 8 + 1;
  ROOM_START_COLS.push(cx);
  for (let r = 1; r <= 5; r++)
    for (let c = cx; c < cx + 5; c++)
      MAP[r][c] = 0;
  if (i < 5) {
    for (let r = 2; r <= 4; r++)
      for (let c = cx+5; c < cx+8; c++)
        MAP[r][c] = 0;
  }
}
const ROOM_SPAWNS = ROOM_START_COLS.map(cx => ({ x: cx+2.5, y: 3.5 }));
// corridor midpoints
const CORR_MIDS = [];
for (let i = 0; i < 5; i++) CORR_MIDS.push({ x: ROOM_START_COLS[i]+6.5, y: 3.5 });

function mapAt(mx, my) {
  const ix = Math.floor(mx), iy = Math.floor(my);
  if (ix < 0 || iy < 0 || ix >= MAP_W || iy >= MAP_H) return 1;
  return MAP[iy][ix];
}

// ══════════════════════════════════════════
//  PALETTE per room
// ══════════════════════════════════════════
const PALS = [
  { w:[88,42,12],  f:[32,16,6],   c:[22,10,3],  a:[255,100,30], s:[18,7,0]  },
  { w:[12,30,88],  f:[6,14,38],   c:[3,8,26],   a:[50,120,255], s:[0,4,18]  },
  { w:[88,12,12],  f:[38,5,5],    c:[26,3,3],   a:[255,40,40],  s:[18,0,0]  },
  { w:[12,80,22],  f:[6,32,10],   c:[3,22,6],   a:[50,255,80],  s:[0,14,4]  },
  { w:[12,42,80],  f:[6,18,34],   c:[3,12,24],  a:[50,190,255], s:[0,7,16]  },
  { w:[52,12,88],  f:[22,6,38],   c:[14,3,26],  a:[170,50,255], s:[9,0,18]  },
];

// ══════════════════════════════════════════
//  CAMERA
// ══════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);

let cam = { x:3.5, y:3.5, a:0 };
let baseX = 3.5, baseY = 3.5, baseA = 0;
let bobT = 0;

// Movement queue
let moveQueue = [];
let moveActive = false;
let moveT = 0, moveDur = 0;
let mStart = {x:0,y:0,a:0}, mEnd = {x:0,y:0,a:0};
let onMoveDone = null;

function queueMove(tx, ty, ta, dur, done) {
  moveQueue.push({ tx, ty, ta, dur, done });
  if (!moveActive) nextMove();
}
function nextMove() {
  if (!moveQueue.length) { moveActive = false; return; }
  const mv = moveQueue.shift();
  moveActive = true; moveT = 0; moveDur = mv.dur;
  mStart = { x: cam.x, y: cam.y, a: cam.a };
  mEnd   = { x: mv.tx, y: mv.ty, a: mv.ta };
  onMoveDone = mv.done || null;
  bobT = 0;
}

function lerp(a,b,t) { return a+(b-a)*t; }
function lerpA(a,b,t) { let d=b-a; while(d>Math.PI)d-=Math.PI*2; while(d<-Math.PI)d+=Math.PI*2; return a+d*t; }
function eio(t) { return t<.5?2*t*t:-1+(4-2*t)*t; }

// ══════════════════════════════════════════
//  RENDERER - full DDA raycaster
// ══════════════════════════════════════════
function render(ts) {
  const cx = cam.x, cy = cam.y, ang = cam.a;
  const fov = Math.PI / 2.1;
  const halfH = H * 0.5;

  const dirX = Math.cos(ang), dirY = Math.sin(ang);
  const planX = -dirY * Math.tan(fov/2);
  const planY =  dirX * Math.tan(fov/2);

  // Pick current palette (blend if between rooms)
  const palIdx = Math.min(currentLevel, 5);
  const pal = PALS[palIdx];

  // ── Floor & Ceiling via ImageData ──────
  const id = ctx.createImageData(W, H);
  const px = id.data;

  for (let y = 0; y < H; y++) {
    const isFloor = y > halfH;
    const rowDir = y - halfH;
    if (rowDir === 0) { continue; }
    const rowDist = H * 0.5 / Math.abs(rowDir);
    const fog = Math.min(1, rowDist / 13);
    const bri = Math.max(0, (1 - fog) * (isFloor ? 0.65 : 0.45));
    const base = isFloor ? pal.f : pal.c;

    const stepFX = rowDist * (2*dirX) / W;
    const stepFY = rowDist * (2*dirY) / W;
    let fx = cx + rowDist*(dirX - planX);
    let fy = cy + rowDist*(dirY - planY);

    for (let x = 0; x < W; x++) {
      // checkerboard texture
      const check = ((Math.floor(fx) + Math.floor(fy)) & 1) ? 1.0 : 0.80;
      const off = (y*W+x)*4;
      px[off]   = base[0]*bri*check | 0;
      px[off+1] = base[1]*bri*check | 0;
      px[off+2] = base[2]*bri*check | 0;
      px[off+3] = 255;
      fx += stepFX; fy += stepFY;
    }
  }
  ctx.putImageData(id, 0, 0);

  // Sky
  const sg = ctx.createLinearGradient(0,0,0,halfH);
  sg.addColorStop(0, `rgb(${pal.s[0]},${pal.s[1]},${pal.s[2]})`);
  sg.addColorStop(1, `rgb(${pal.c[0]+10},${pal.c[1]+10},${pal.c[2]+10})`);
  ctx.fillStyle = sg; ctx.fillRect(0, 0, W, halfH);

  // ── Wall strips (DDA) ──────────────────
  for (let col = 0; col < W; col++) {
    const camX = (2*col/W) - 1;
    const rdx = dirX + planX*camX;
    const rdy = dirY + planY*camX;

    let mx = Math.floor(cx), my = Math.floor(cy);
    const ddx = Math.abs(1/(rdx||1e-20));
    const ddy = Math.abs(1/(rdy||1e-20));
    let sdx, sdy, sx, sy, side;

    if (rdx < 0) { sx=-1; sdx=(cx-mx)*ddx; } else { sx=1; sdx=(mx+1-cx)*ddx; }
    if (rdy < 0) { sy=-1; sdy=(cy-my)*ddy; } else { sy=1; sdy=(my+1-cy)*ddy; }

    let hit=false;
    for (let s=0; s<80&&!hit; s++) {
      if (sdx<sdy) { sdx+=ddx; mx+=sx; side=0; } else { sdy+=ddy; my+=sy; side=1; }
      if (mapAt(mx,my)) hit=true;
    }

    const dist = Math.max(0.01, side===0
      ? (mx-cx+(1-sx)/2)/rdx
      : (my-cy+(1-sy)/2)/rdy);

    const wallX = side===0
      ? cy+dist*rdy - Math.floor(cy+dist*rdy)
      : cx+dist*rdx - Math.floor(cx+dist*rdx);

    const fog = Math.min(1, dist/14);
    const sideFactor = side===1 ? 0.6 : 1.0;
    const bri = Math.max(0, (1-fog*fog)) * sideFactor;
    // brick texture (horizontal mortar lines + vertical)
    const ty = (1 / dist) * H;  // approx wall height / H
    const wallH = Math.min(H*12, H/dist);
    const wTop = halfH - wallH/2 | 0;
    const wBot = halfH + wallH/2 | 0;

    const band = (Math.floor(wallX*6)+(Math.floor(dist)%2)) % 2 === 0 ? 1.0 : 0.84;
    const r = pal.w[0]*bri*band | 0;
    const g = pal.w[1]*bri*band | 0;
    const b = pal.w[2]*bri*band | 0;
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.fillRect(col, wTop, 1, wBot-wTop);

    // Torch glow: accent light bleeds onto nearby walls
    const roomCX = ROOM_SPAWNS[palIdx].x;
    const roomCY = ROOM_SPAWNS[palIdx].y;
    const tDist = Math.hypot(cx-roomCX, cy-roomCY);
    if (dist < 7 && tDist < 5) {
      const lf = Math.max(0, (1-tDist/5)*(1-dist/7)*0.4);
      ctx.fillStyle = `rgba(${pal.a[0]},${pal.a[1]},${pal.a[2]},${lf})`;
      ctx.fillRect(col, wTop, 1, wBot-wTop);
    }
  }

  // ── Portal glow ahead ──────────────────
  // Visualise the exit portal when close to corridor
  const nextRoomIdx = currentLevel + 1;
  if (nextRoomIdx < 6) {
    const portalX = ROOM_START_COLS[currentLevel] + 5.0;
    const dx = portalX - cx, dy = 3.5 - cy;
    const pdist = Math.hypot(dx, dy);
    if (pdist < 5) {
      const dotFwd = dx*dirX + dy*dirY;
      if (dotFwd > 0) {
        const alpha = Math.max(0, (1-pdist/5)*0.18);
        const pg = ctx.createRadialGradient(W/2, halfH, 0, W/2, halfH, W*0.35);
        pg.addColorStop(0, `rgba(${pal.a[0]},${pal.a[1]},${pal.a[2]},${alpha})`);
        pg.addColorStop(1, 'transparent');
        ctx.fillStyle = pg; ctx.fillRect(0,0,W,H);
      }
    }
  }

  // ── Vignette ───────────────────────────
  const vg = ctx.createRadialGradient(W/2,H/2,H*.25,W/2,H/2,H*.92);
  vg.addColorStop(0,'transparent'); vg.addColorStop(1,'rgba(0,0,0,.7)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);

  // ── Crosshair ──────────────────────────
  const chx=W/2, chy=halfH;
  ctx.strokeStyle=`rgba(${pal.a[0]},${pal.a[1]},${pal.a[2]},0.85)`;
  ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(chx-11,chy); ctx.lineTo(chx+11,chy);
  ctx.moveTo(chx,chy-11); ctx.lineTo(chx,chy+11);
  ctx.stroke();

  // Scanlines
  ctx.fillStyle='rgba(0,0,0,0.05)';
  for (let sy=0;sy<H;sy+=4) ctx.fillRect(0,sy,W,2);
}

// ══════════════════════════════════════════
//  MAIN LOOP
// ══════════════════════════════════════════
let lastTs = 0;
function loop(ts) {
  const dt = Math.min((ts-lastTs)/1000, 0.06); lastTs = ts;

  if (moveActive) {
    moveT += dt / moveDur;
    if (moveT >= 1) {
      moveT = 1; moveActive = false;
      cam.x = mEnd.x; cam.y = mEnd.y; cam.a = mEnd.a;
      baseX = cam.x; baseY = cam.y; baseA = cam.a;
      const cb = onMoveDone; onMoveDone = null;
      nextMove();
      if (cb) cb();
    } else {
      const t = eio(moveT);
      cam.x = lerp(mStart.x, mEnd.x, t);
      cam.y = lerp(mStart.y, mEnd.y, t);
      cam.a = lerpA(mStart.a, mEnd.a, t);
      // Head bob while walking
      bobT += dt * 5.5;
      cam.y += Math.sin(bobT * 2) * 0.05;
      cam.a += Math.sin(bobT) * 0.012;
    }
  } else if (gameRunning) {
    bobT += dt;
    cam.a = baseA + Math.sin(bobT*0.55)*0.009;
    cam.y = baseY + Math.sin(bobT*0.85)*0.014;
    cam.x = baseX + Math.cos(bobT*0.45)*0.006;
  }

  render(ts);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ══════════════════════════════════════════
//  GAME STATE
// ══════════════════════════════════════════
let currentLevel = 0, lives = 3, gameRunning = false;

function updateHUD() {
  document.getElementById('level-info').textContent = `SALA ${Math.min(currentLevel+1,6)} / 6`;
  for (let i=1;i<=3;i++) {
    const el=document.getElementById(`l${i}`);
    el.className='life'+(i>lives?' dead':'');
  }
  document.getElementById('pbar').style.width=`${(currentLevel/6)*100}%`;
  for (let i=0;i<6;i++) {
    const mm=document.getElementById(`mm${i}`);
    mm.className='mm';
    if(i<currentLevel)  mm.classList.add('visited');
    if(i===currentLevel) mm.classList.add('current');
  }
}

function doFlash(color='#e8d060') {
  const el=document.getElementById('flash');
  el.style.background=color; el.style.opacity='.8';
  setTimeout(()=>{ el.style.opacity='0'; },160);
}

function announce(text,color='#e8d060') {
  const el=document.getElementById('room-announce');
  el.style.color=color; el.style.textShadow=`0 0 40px ${color}`;
  el.textContent=text; el.style.opacity='1';
  setTimeout(()=>{ el.style.opacity='0'; },1800);
}

function showQuestion() {
  const lvl=LEVELS[currentLevel];
  document.getElementById('rlabel').textContent=`NIVEL ${currentLevel+1} · ${lvl.room}`;
  document.getElementById('qtext').innerHTML=`${lvl.parts[0]}<span class="blank">___</span>${lvl.parts[1]}`;
  document.getElementById('qtrans').textContent=lvl.parts[0]+'___'+lvl.parts[1]+' · '+lvl.note;
  const optDiv=document.getElementById('opts');
  optDiv.innerHTML='';
  [...lvl.opts].sort(()=>Math.random()-.5).forEach(opt=>{
    const btn=document.createElement('button');
    btn.className='obtn'; btn.textContent=opt;
    btn.onclick=()=>handleAnswer(btn,opt);
    optDiv.appendChild(btn);
  });
  document.getElementById('qpanel').classList.remove('off');
}

function handleAnswer(btn,chosen) {
  const lvl=LEVELS[currentLevel];
  const all=document.querySelectorAll('.obtn');
  all.forEach(b=>b.disabled=true);

  if (chosen===lvl.ans) {
    btn.classList.add('ok');
    document.getElementById('qtext').innerHTML=
      `${lvl.parts[0]}<span class="blank" style="color:#64ff78;border-color:#64ff78">${chosen}</span>${lvl.parts[1]}`;
    doFlash('#44ff88');
    setTimeout(()=>{
      document.getElementById('qpanel').classList.add('off');
      if (currentLevel<5) doAdvance();
      else { currentLevel++; updateHUD(); setTimeout(showVictory,400); }
    },800);
  } else {
    btn.classList.add('bad');
    lives--; updateHUD(); doFlash('#ff2222');
    if (lives<=0) setTimeout(doGameOver,700);
    else {
      announce('INCORRECTO · 再试一次','#ff4444');
      setTimeout(()=>{ btn.classList.remove('bad'); all.forEach(b=>b.disabled=false); },650);
    }
  }
}

// Walk cam from current room → corridor → next room
function doAdvance() {
  const from = currentLevel;
  currentLevel++;
  updateHUD();
  announce(`→ ${LEVELS[currentLevel].room}`,'#e8d060');

  const corr = CORR_MIDS[from];
  const dest = ROOM_SPAWNS[currentLevel];

  // Phase 1: walk out of current room into corridor (1.1s)
  queueMove(corr.x, corr.y, 0, 1.1, null);
  // Phase 2: push through corridor (0.7s)
  queueMove(corr.x + 1.0, corr.y, 0, 0.7, null);
  // Phase 3: enter next room (1.0s)
  queueMove(dest.x, dest.y, 0, 1.0, ()=>{
    baseX=dest.x; baseY=dest.y; baseA=0;
    setTimeout(showQuestion, 320);
  });
}

function doGameOver() {
  lives=3; updateHUD(); doFlash('#ff0000');
  document.getElementById('qpanel').classList.add('off');
  announce('CONTINÚA…','#ff4444');
  setTimeout(showQuestion,700);
}

function showVictory() {
  document.getElementById('pbar').style.width='100%';
  const ov=document.getElementById('overlay');
  ov.classList.remove('gone'); ov.style.opacity='1';
  document.getElementById('start-screen').style.display='none';
  document.getElementById('end-screen').style.display='block';
  doFlash('#e8d060');
}

function startGame() {
  currentLevel=0; lives=3; gameRunning=true;
  cam={x:3.5,y:3.5,a:0}; baseX=3.5; baseY=3.5; baseA=0;
  moveQueue=[]; moveActive=false;
  document.getElementById('overlay').classList.add('gone');
  updateHUD();
  announce(`${LEVELS[0].room}`,'#e8d060');
  setTimeout(showQuestion,900);
}

function restartGame() {
  currentLevel=0; lives=3; gameRunning=true;
  cam={x:3.5,y:3.5,a:0}; baseX=3.5; baseY=3.5; baseA=0;
  moveQueue=[]; moveActive=false;
  document.getElementById('end-screen').style.display='none';
  document.getElementById('start-screen').style.display='block';
  document.getElementById('overlay').classList.remove('gone');
  document.getElementById('overlay').style.opacity='1';
  updateHUD();
}

updateHUD();
</script>
